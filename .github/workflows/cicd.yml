name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ────────────────────────────────────────
  # CI JOB — runs on every push and every PR
  # ────────────────────────────────────────
  ci:
    name: Test
    runs-on: ubuntu-latest           # GitHub spins up a fresh Ubuntu VM

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2   # downloads your repo onto the runner

      - name: Setup Node.js
        ses: actions/setup-node@v4.4.0  # installs Node.js (no manual install needed)
        with:
          node-version: '24'
          cache: 'npm'               # caches node_modules between runs = faster

      - name: Install dependencies
        run: npm ci                  # installs everything in package.json

      - name: Run tests
        run: npm test                # runs jest — if any test fails, pipeline stops

  # ────────────────────────────────────────
  # CD JOB — only runs after CI passes
  #          only on pushes to main (not PRs)
  # ────────────────────────────────────────
  cd:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest
    needs: ci                                        # wait for ci job to pass
    if: github.ref == 'refs/heads/main'              # only on main branch

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3          # enables BuildKit (faster builds)

      - name: Log in to Docker Hub
        uses: docker/login-action@v3                 # no manual docker login needed
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5            # builds Dockerfile and pushes image
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest
            ${{ secrets.DOCKER_USERNAME }}/cicd-demo:${{ github.sha }}
          cache-from: type=gha                       # cache Docker layers = faster builds
          cache-to: type=gha,mode=max

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1                 # SSHes into EC2, runs commands below
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull the new image from Docker Hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest

            # Stop and remove the old running container (|| true = don't fail if not running)
            docker stop cicd-demo || true
            docker rm   cicd-demo || true

            # Start the new container
            docker run -d \
              --name cicd-demo \
              --restart unless-stopped \
              -p 80:3000 \
              ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest

            # Print status — visible in GitHub Actions logs
            echo "=== Deployed successfully ==="
            docker ps | grep cicd-demo
